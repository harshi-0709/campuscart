<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Campus Cart</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-container">
  <div class="blob-card">
    <h2>Join Campus Cart </h2>

    <form id="registerForm">
      <input type="text"  name="name"     placeholder="Full Name"     required autocomplete="name">
      <input type="email" name="email"    placeholder="College Email"  required autocomplete="email">
      <input type="text"  name="college"  placeholder="College / University">
      <input type="tel"   name="phone"    placeholder="WhatsApp Number (for buyers to reach you)">
      <input type="password" name="password" placeholder="Password (min 6 chars)" required minlength="6" autocomplete="new-password">
      <div class="error-msg" id="errorMsg"></div>
      <button type="submit" id="submitBtn">Create Account</button>
    </form>

    <p class="switch">Already have an account? <a href="login.html">Login</a></p>
  </div>
</div>

<script src="app.js"></script>
<script>
  const API_BASE = "http://localhost:5000/api";

  document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("submitBtn");
    const errMsg = document.getElementById("errorMsg");
    const data = Object.fromEntries(new FormData(e.target).entries());

    btn.textContent = "Creating account...";
    btn.disabled = true;
    errMsg.style.display = "none";

    try {
      const res = await fetch(`${API_BASE}/auth/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });

      const json = await res.json();

      if (json.token) {
        localStorage.setItem("token", json.token);
        localStorage.setItem("user", JSON.stringify(json.user));
        window.location.href = "index.html";
      } else {
        errMsg.textContent = json.message || "Registration failed";
        errMsg.style.display = "block";
        btn.textContent = "Create Account";
        btn.disabled = false;
      }
    } catch (err) {
      errMsg.textContent = "Server error. Is the backend running?";
      errMsg.style.display = "block";
      btn.textContent = "Create Account";
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
