<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Listing — Campus Cart</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="market-header">
    <a href="landing.html" class="brand-logo">Campus Cart</a>
    <div id="userActions" class="user-actions"></div>
  </header>

  <div class="create-page">
    <a href="index.html" class="back-link">← Back</a>
    <h2>List Something 🛍️</h2>

    <form id="listingForm" class="create-form">
      <div class="form-group">
        <label>Item Title *</label>
        <input type="text" name="title" placeholder="e.g. Data Structures textbook" required>
      </div>
      <div class="form-group">
        <label>Category *</label>
        <select name="category" required>
          <option value="">Select category</option>
          <option value="Books">📚 Books</option>
          <option value="Electronics">💻 Electronics</option>
          <option value="Furniture">🪑 Furniture</option>
          <option value="Clothing">👕 Clothing</option>
          <option value="Sports">⚽ Sports</option>
          <option value="Food">🍕 Food</option>
          <option value="Other">📦 Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Description *</label>
        <textarea name="description" placeholder="Describe the condition, how old it is, etc." required></textarea>
      </div>
      <div class="form-group">
        <label>Price (₹) *</label>
        <input type="number" name="price" placeholder="0" required min="0">
      </div>
      <div class="form-group">
        <label>Images (up to 5)</label>
        <input type="file" name="images" id="imageInput" accept="image/*" multiple>
      </div>

      <!-- Image preview -->
      <div id="imagePreview" style="display:flex;gap:10px;flex-wrap:wrap;"></div>

      <div class="error-msg" id="errorMsg"></div>
      <button type="submit" class="submit-btn" id="submitBtn">Post Listing</button>
    </form>
  </div>

  <script src="app.js"></script>
  <script>
    const API_BASE = "http://localhost:5000/api";

    // Redirect if not logged in
    if (!localStorage.getItem("token")) {
      alert("Please login to create a listing");
      window.location.href = "login.html";
    }

    // Image preview
    document.getElementById("imageInput").addEventListener("change", (e) => {
      const preview = document.getElementById("imagePreview");
      preview.innerHTML = "";
      Array.from(e.target.files).slice(0, 5).forEach(file => {
        const url = URL.createObjectURL(file);
        const img = document.createElement("img");
        img.src = url;
        img.style.cssText = "width:80px;height:80px;object-fit:cover;border-radius:8px;border:2px solid #0a0a0f;";
        preview.appendChild(img);
      });
    });

    // Form submit
    document.getElementById("listingForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submitBtn");
      const errMsg = document.getElementById("errorMsg");

      btn.textContent = "Posting...";
      btn.disabled = true;
      errMsg.style.display = "none";

      const formData = new FormData(e.target);
      const files = document.getElementById("imageInput").files;
      // FormData already includes files from the <input name="images">

      try {
        const res = await fetch(`${API_BASE}/listings`, {
          method: "POST",
          headers: { Authorization: `Bearer ${localStorage.getItem("token")}` },
          body: formData,
        });

        const json = await res.json();

        if (res.ok) {
          alert("Listing created! 🎉");
          window.location.href = "index.html";
        } else {
          errMsg.textContent = json.message || "Failed to create listing";
          errMsg.style.display = "block";
          btn.textContent = "Post Listing";
          btn.disabled = false;
        }
      } catch (err) {
        errMsg.textContent = "Server error. Is the backend running?";
        errMsg.style.display = "block";
        btn.textContent = "Post Listing";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
