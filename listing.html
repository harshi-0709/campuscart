<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listing — Campus Cart</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="market-header">
    <a href="landing.html" class="brand-logo">Campus Cart</a>
    <div id="userActions" class="user-actions"></div>
  </header>

  <div class="listing-page">
    <a href="index.html" class="back-link">← Back to listings</a>

    <div id="listing-gallery" class="listing-gallery">
      <div class="skel-img" style="height:280px;border-radius:14px;"></div>
    </div>

    <div class="listing-info">
      <h1 id="listing-title">Loading...</h1>
      <div class="listing-price" id="listing-price"></div>

      <div class="listing-meta">
        <span class="meta-chip" id="listing-category"></span>
        <span class="meta-chip">👤 <span id="listing-seller"></span></span>
        <span class="meta-chip">🏫 <span id="listing-college"></span></span>
      </div>

      <p class="listing-desc" id="listing-desc"></p>

      <a class="contact-btn" id="contact-btn" href="#" target="_blank">
        💬 Contact on WhatsApp
      </a>
    </div>
  </div>

  <script src="app.js"></script>
  <script>loadListing();</script>
</body>
</html>
